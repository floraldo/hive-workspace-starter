name: Validate starter

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate workspace contract
        run: python3 scripts/validate-starter.py

      - name: Check Bash syntax
        run: bash -n scripts/bootstrap-agent.sh scripts/launch-agent.sh

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $failed = $false
          foreach ($path in @('scripts/bootstrap-agent.ps1', 'scripts/launch-agent.ps1')) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) {
              $errors | Format-Table
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
